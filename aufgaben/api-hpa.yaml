# TODO: Erstelle einen HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-server-hpa
  namespace: novatech-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  # TODO: behavior für Scale-Up/Down konfigurieren
  # behavior:
  #   scaleUp:
  #     stabilizationWindowSeconds: 60
  #   scaleDown:
  #     stabilizationWindowSeconds: 300
