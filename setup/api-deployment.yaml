apiVersion: apps/v1
kind: Deployment
metadata:
  name: novatech-api
  namespace: novatech-dev
  labels:
    app: novatech-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: novatech-api
  template:
    metadata:
      labels:
        app: novatech-api
        tier: backend
    spec:
      containers:
        - name: api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
